title: Neuro-Symbolic Artificial Intelligence Laboratory at ShenZhen University


collections:
  people:
    output: true
    permalink: /people/:name/
  projectpage:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: "people"
    values:
      layout: person
  - scope:
      path: ""
      type: "projectpage"
    values:
      layout: projectpage

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
